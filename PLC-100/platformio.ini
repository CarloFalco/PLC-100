; PlatformIO configuration for ESP32‑C6 + Arduino Zigbee
;
; - Board: ESP32‑C6 DevKit (compatible with many ESP32‑C6 based PLC boards)
; - Framework: Arduino (includes Zigbee core + endpoint helpers)
; - Role: Zigbee Router (mains‑powered, estende la mesh)
; - Partitions: custom table con partizioni Zigbee (zb_storage / zb_fct) compatibili con espressif/arduino‑esp32

[env:esp32-c6-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino

monitor_speed = 115200

build_flags =
    -DZIGBEE_MODE_ED=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Partizioni compatibili con Zigbee (derivate da esempio ufficiale)
board_build.partitions = partitions.csv
